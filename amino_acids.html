<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amino Acid Practice</title>
  <script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d0d0d 0%, #1a0800 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(200,16,46,0.35);
      border-radius: 20px;
      padding: 36px 40px;
      max-width: 920px;
      width: 100%;
      color: #e0e0e0;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      align-self: flex-start;
      margin: 20px 0;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      color: #FFCD00;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #a89a8e;
      margin-bottom: 28px;
    }

    /* Score bar */
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px 20px;
      margin-bottom: 22px;
    }

    .score-item { text-align: center; }
    .score-item .label { color: #a89a8e; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .score-item .value { font-size: 1.35rem; font-weight: 700; color: #e0e0e0; }
    .score-item .value.gold   { color: #FFCD00; }
    .score-item .value.muted  { color: #a89a8e; }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 18px;
    }

    @media (max-width: 620px) { .main-grid { grid-template-columns: 1fr; } }

    /* Structure panel */
    .structure-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(200,16,46,0.25);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 300px;
    }

    .ph-badge {
      font-size: 0.78rem;
      font-weight: 700;
      color: #C8102E;
      background: rgba(200,16,46,0.1);
      border: 1px solid rgba(200,16,46,0.35);
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      transition: color 0.3s, background 0.3s, border-color 0.3s;
    }

    .ph-badge.revealed {
      color: #FFCD00;
      background: rgba(255,205,0,0.10);
      border-color: rgba(255,205,0,0.4);
    }

    #struct-box {
      background: #f1f5f9;
      border-radius: 10px;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 230px;
      overflow: hidden;
    }

    #struct-box svg { max-width: 100%; height: 230px; }

    .struct-msg {
      font-size: 0.82rem;
      color: #94a3b8;
      font-style: italic;
      padding: 20px;
      text-align: center;
    }

    /* Answer panel */
    .answer-panel {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .field-group { display: flex; flex-direction: column; gap: 5px; }

    .field-label {
      font-size: 0.78rem;
      color: #a89a8e;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .field-row { display: flex; align-items: center; gap: 8px; }

    .field-input {
      flex: 1;
      padding: 10px 13px;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field-input:focus { border-color: #FFCD00; }
    .field-input.ok  { border-color: #FFCD00; background: rgba(255,205,0,0.08); }
    .field-input.bad { border-color: #C8102E; background: rgba(200,16,46,0.10); }
    .field-input:disabled { opacity: 0.7; cursor: not-allowed; }

    select.field-input { cursor: pointer; }
    select.field-input option { background: #1a0800; color: #e2e8f0; }

    .ind { font-size: 1.1rem; width: 22px; flex-shrink: 0; text-align: center; }

    /* Buttons */
    .btn {
      padding: 11px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }

    .btn-check { background: linear-gradient(135deg, #C8102E, #8b0a1e); color: white; flex: 1; }
    .btn-check:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(200,16,46,0.45); }

    .btn-next { background: linear-gradient(135deg, #685C53, #4a4040); color: white; flex: 1; }
    .btn-next:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(104,92,83,0.4); }

    .btn:active { transform: translateY(0) !important; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .btn-row { display: flex; gap: 10px; margin-top: 4px; }

    /* Feedback */
    .feedback {
      border-radius: 12px;
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }

    .feedback.show {
      padding: 16px 20px;
      max-height: 300px;
    }

    .feedback.all-correct { background: rgba(255,205,0,0.10);  border: 1px solid rgba(255,205,0,0.4);  color: #FFCD00; }
    .feedback.partial     { background: rgba(200,16,46,0.08);  border: 1px solid rgba(200,16,46,0.3);  color: #e8b4a0; }
    .feedback.wrong       { background: rgba(200,16,46,0.12);  border: 1px solid rgba(200,16,46,0.4);  color: #f4a0a8; }

    .feedback .fb-title { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .feedback .fb-answers { font-size: 0.85rem; color: #a89a8e; margin-top: 6px; }
    .feedback .fb-answers b { color: #e2e8f0; }
    .feedback .fb-note { margin-top: 8px; font-size: 0.8rem; color: #FFCD00; font-style: italic; }

    .reset-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.78rem;
      color: #685C53;
      cursor: pointer;
      text-decoration: underline;
    }
    .reset-link:hover { color: #FFCD00; }
  </style>
</head>
<body>
<div class="container">
  <h1>Amino Acid Practice</h1>
  <p class="subtitle">Identify amino acids from their skeletal structures — including the pH shown</p>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="score-item">
      <div class="label">Attempted</div>
      <div class="value" id="s-total">0</div>
    </div>
    <div class="score-item">
      <div class="label">All Correct</div>
      <div class="value gold" id="s-correct">0</div>
    </div>
    <div class="score-item">
      <div class="label">Partial</div>
      <div class="value muted" id="s-partial">0</div>
    </div>
    <div class="score-item">
      <div class="label">Score</div>
      <div class="value" id="s-pct">—</div>
    </div>
  </div>

  <!-- Main grid -->
  <div class="main-grid">
    <!-- Structure viewer -->
    <div class="structure-panel">
      <div class="ph-badge" id="ph-badge">pH ?</div>
      <div id="struct-box">
        <div class="struct-msg" id="struct-msg">Loading structure renderer…</div>
      </div>
    </div>

    <!-- Answer fields -->
    <div class="answer-panel">
      <div class="field-group">
        <div class="field-label">1-Letter Code</div>
        <div class="field-row">
          <input class="field-input" id="inp-c1" type="text" maxlength="2"
                 placeholder="e.g. A" autocomplete="off" />
          <span class="ind" id="ind-c1"></span>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">3-Letter Code</div>
        <div class="field-row">
          <input class="field-input" id="inp-c3" type="text" maxlength="4"
                 placeholder="e.g. Ala" autocomplete="off" />
          <span class="ind" id="ind-c3"></span>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Full Name</div>
        <div class="field-row">
          <input class="field-input" id="inp-name" type="text"
                 placeholder="e.g. Alanine" autocomplete="off" />
          <span class="ind" id="ind-name"></span>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">Type</div>
        <div class="field-row">
          <select class="field-input" id="inp-type">
            <option value="">— Select type —</option>
            <option value="nonpolar">Nonpolar</option>
            <option value="polar">Polar</option>
            <option value="acidic">Acidic</option>
            <option value="basic">Basic</option>
          </select>
          <span class="ind" id="ind-type"></span>
        </div>
      </div>

      <div class="field-group">
        <div class="field-label">pH Shown</div>
        <div class="field-row">
          <select class="field-input" id="inp-ph">
            <option value="">— Select pH —</option>
            <option value="2">pH 2 (fully protonated)</option>
            <option value="7">pH 7 (physiological / zwitterion)</option>
            <option value="13">pH 13 (fully deprotonated)</option>
          </select>
          <span class="ind" id="ind-ph"></span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-check" id="btn-check" onclick="checkAnswers()">Check Answers</button>
        <button class="btn btn-next" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  </div>

  <!-- Feedback -->
  <div class="feedback" id="feedback"></div>

  <span class="reset-link" onclick="resetScore()">Reset score</span>
</div>

<script>
// ─── Amino Acid Database ──────────────────────────────────────────────────────
// SMILES with L-amino acid stereochemistry via [C@@H]/[C@H].
// pH 2  → NH₃⁺, COOH backbone (fully protonated)
// pH 7  → NH₃⁺, COO⁻ backbone (zwitterion) + ionizable side chains at physiological state
// pH 13 → NH₂, COO⁻ backbone (fully deprotonated) + ionizable side chains deprotonated
const AA = [
  {
    name: "Glycine", code1: "G", code3: "Gly", type: "nonpolar",
    note: "Smallest amino acid; the only achiral one (R = H).",
    smiles: {
      2:  "[NH3+]CC(=O)O",
      7:  "[NH3+]CC(=O)[O-]",
      13: "NCC(=O)[O-]"
    }
  },
  {
    name: "Alanine", code1: "A", code3: "Ala", type: "nonpolar",
    note: "Simplest chiral amino acid (S); methyl side chain.",
    smiles: {
      2:  "[NH3+][C@@H](C)C(=O)O",
      7:  "[NH3+][C@@H](C)C(=O)[O-]",
      13: "N[C@@H](C)C(=O)[O-]"
    }
  },
  {
    name: "Valine", code1: "V", code3: "Val", type: "nonpolar",
    note: "Branched-chain (S); isopropyl side chain.",
    smiles: {
      2:  "[NH3+][C@@H](C(C)C)C(=O)O",
      7:  "[NH3+][C@@H](C(C)C)C(=O)[O-]",
      13: "N[C@@H](C(C)C)C(=O)[O-]"
    }
  },
  {
    name: "Leucine", code1: "L", code3: "Leu", type: "nonpolar",
    note: "Branched-chain (S); isobutyl side chain.",
    smiles: {
      2:  "[NH3+][C@@H](CC(C)C)C(=O)O",
      7:  "[NH3+][C@@H](CC(C)C)C(=O)[O-]",
      13: "N[C@@H](CC(C)C)C(=O)[O-]"
    }
  },
  {
    name: "Isoleucine", code1: "I", code3: "Ile", type: "nonpolar",
    note: "Branched-chain; two chiral centers (2S,3S); sec-butyl side chain.",
    smiles: {
      2:  "[NH3+][C@@H]([C@H](CC)C)C(=O)O",
      7:  "[NH3+][C@@H]([C@H](CC)C)C(=O)[O-]",
      13: "N[C@@H]([C@H](CC)C)C(=O)[O-]"
    }
  },
  {
    name: "Proline", code1: "P", code3: "Pro", type: "nonpolar",
    note: "Secondary amine in a pyrrolidine ring (S); constrains backbone flexibility.",
    smiles: {
      2:  "OC(=O)[C@@H]1CCC[NH2+]1",
      7:  "[O-]C(=O)[C@@H]1CCC[NH2+]1",
      13: "[O-]C(=O)[C@@H]1CCCN1"
    }
  },
  {
    name: "Phenylalanine", code1: "F", code3: "Phe", type: "nonpolar",
    note: "Aromatic benzyl side chain (S); no ionizable group.",
    smiles: {
      2:  "[NH3+][C@@H](Cc1ccccc1)C(=O)O",
      7:  "[NH3+][C@@H](Cc1ccccc1)C(=O)[O-]",
      13: "N[C@@H](Cc1ccccc1)C(=O)[O-]"
    }
  },
  {
    name: "Tryptophan", code1: "W", code3: "Trp", type: "nonpolar",
    note: "Largest amino acid (S); indole side chain absorbs UV at 280 nm.",
    smiles: {
      2:  "[NH3+][C@@H](Cc1c[nH]c2ccccc12)C(=O)O",
      7:  "[NH3+][C@@H](Cc1c[nH]c2ccccc12)C(=O)[O-]",
      13: "N[C@@H](Cc1c[nH]c2ccccc12)C(=O)[O-]"
    }
  },
  {
    name: "Methionine", code1: "M", code3: "Met", type: "nonpolar",
    note: "Contains sulfur as a thioether (S); universal N-terminal residue (AUG start codon).",
    smiles: {
      2:  "[NH3+][C@@H](CCSC)C(=O)O",
      7:  "[NH3+][C@@H](CCSC)C(=O)[O-]",
      13: "N[C@@H](CCSC)C(=O)[O-]"
    }
  },
  {
    name: "Serine", code1: "S", code3: "Ser", type: "polar",
    note: "Hydroxymethyl side chain (S); common phosphorylation site.",
    smiles: {
      2:  "[NH3+][C@@H](CO)C(=O)O",
      7:  "[NH3+][C@@H](CO)C(=O)[O-]",
      13: "N[C@@H](CO)C(=O)[O-]"
    }
  },
  {
    name: "Threonine", code1: "T", code3: "Thr", type: "polar",
    note: "β-Hydroxyl group; two chiral centers (2S,3R); phosphorylation site.",
    smiles: {
      2:  "[NH3+][C@@H]([C@@H](O)C)C(=O)O",
      7:  "[NH3+][C@@H]([C@@H](O)C)C(=O)[O-]",
      13: "N[C@@H]([C@@H](O)C)C(=O)[O-]"
    }
  },
  {
    name: "Cysteine", code1: "C", code3: "Cys", type: "polar",
    note: "Thiol side chain, R config at α-C (thiol raises CIP priority above carboxyl); pKa ~8.3; forms disulfide bonds.",
    smiles: {
      2:  "[NH3+][C@H](CS)C(=O)O",
      7:  "[NH3+][C@H](CS)C(=O)[O-]",
      13: "N[C@H](C[S-])C(=O)[O-]"
    }
  },
  {
    name: "Asparagine", code1: "N", code3: "Asn", type: "polar",
    note: "Amide side chain (S); no ionizable group; common N-linked glycosylation site.",
    smiles: {
      2:  "[NH3+][C@@H](CC(N)=O)C(=O)O",
      7:  "[NH3+][C@@H](CC(N)=O)C(=O)[O-]",
      13: "N[C@@H](CC(N)=O)C(=O)[O-]"
    }
  },
  {
    name: "Glutamine", code1: "Q", code3: "Gln", type: "polar",
    note: "Amide side chain (S); one carbon longer than Asn; no ionizable group.",
    smiles: {
      2:  "[NH3+][C@@H](CCC(N)=O)C(=O)O",
      7:  "[NH3+][C@@H](CCC(N)=O)C(=O)[O-]",
      13: "N[C@@H](CCC(N)=O)C(=O)[O-]"
    }
  },
  {
    name: "Tyrosine", code1: "Y", code3: "Tyr", type: "polar",
    note: "Phenol side chain (S), pKa ~10.5; deprotonated at pH 13 (phenolate, O⁻); absorbs UV at 280 nm.",
    smiles: {
      2:  "[NH3+][C@@H](Cc1ccc(O)cc1)C(=O)O",
      7:  "[NH3+][C@@H](Cc1ccc(O)cc1)C(=O)[O-]",
      13: "N[C@@H](Cc1ccc([O-])cc1)C(=O)[O-]"
    }
  },
  {
    name: "Aspartate", code1: "D", code3: "Asp", type: "acidic",
    note: "Side chain carboxyl pKa ~3.9 (S); negatively charged (COO⁻) at pH 7 and above.",
    smiles: {
      2:  "[NH3+][C@@H](CC(=O)O)C(=O)O",
      7:  "[NH3+][C@@H](CC(=O)[O-])C(=O)[O-]",
      13: "N[C@@H](CC(=O)[O-])C(=O)[O-]"
    }
  },
  {
    name: "Glutamate", code1: "E", code3: "Glu", type: "acidic",
    note: "Side chain carboxyl pKa ~4.1 (S); negatively charged (COO⁻) at pH 7 and above.",
    smiles: {
      2:  "[NH3+][C@@H](CCC(=O)O)C(=O)O",
      7:  "[NH3+][C@@H](CCC(=O)[O-])C(=O)[O-]",
      13: "N[C@@H](CCC(=O)[O-])C(=O)[O-]"
    }
  },
  {
    name: "Lysine", code1: "K", code3: "Lys", type: "basic",
    note: "ε-Amino group pKa ~10.5 (S); positively charged (NH₃⁺) at pH 7; neutral (NH₂) at pH 13.",
    smiles: {
      2:  "[NH3+][C@@H](CCCC[NH3+])C(=O)O",
      7:  "[NH3+][C@@H](CCCC[NH3+])C(=O)[O-]",
      13: "N[C@@H](CCCCN)C(=O)[O-]"
    }
  },
  {
    name: "Arginine", code1: "R", code3: "Arg", type: "basic",
    note: "Guanidinium pKa ~12.5 (S); remains positively charged at pH 7; deprotonated near pH 13.",
    smiles: {
      2:  "[NH3+][C@@H](CCCNC(=[NH2+])N)C(=O)O",
      7:  "[NH3+][C@@H](CCCNC(=[NH2+])N)C(=O)[O-]",
      13: "N[C@@H](CCCNC(=N)N)C(=O)[O-]"
    }
  },
  {
    name: "Histidine", code1: "H", code3: "His", type: "basic",
    note: "Imidazole pKa ~6.0 (S); protonated (imidazolium) at pH 2, mostly neutral at pH 7.",
    smiles: {
      2:  "[NH3+][C@@H](Cc1c[nH+]cn1)C(=O)O",
      7:  "[NH3+][C@@H](Cc1c[nH]cn1)C(=O)[O-]",
      13: "N[C@@H](Cc1c[nH]cn1)C(=O)[O-]"
    }
  }
];

const TYPE_LABELS = {
  nonpolar: "Nonpolar",
  polar:    "Polar",
  acidic:   "Acidic",
  basic:    "Basic"
};

// ─── State ────────────────────────────────────────────────────────────────────
let current  = null;       // { aa, ph }
let answered = false;      // true only when ALL fields are correct
let scored   = false;      // true after first checkAnswers() per question
let score    = { total: 0, correct: 0, partial: 0, pts: 0, maxPts: 0 };

// ─── RDKit ────────────────────────────────────────────────────────────────────
let rdkitReady   = false;
let pendingSmiles = null;

window.initRDKitModule({
  locateFile: f => `https://unpkg.com/@rdkit/rdkit/dist/${f}`
}).then(RDKit => {
  window.RDKit = RDKit;
  rdkitReady = true;
  const msg = document.getElementById('struct-msg');
  if (msg) msg.style.display = 'none';
  if (pendingSmiles !== null) {
    drawStructure(pendingSmiles);
    pendingSmiles = null;
  }
}).catch(() => {
  document.getElementById('struct-box').innerHTML =
    '<div class="struct-msg">Structure renderer failed to load.</div>';
});

function drawStructure(smiles) {
  const box = document.getElementById('struct-box');

  if (!rdkitReady) {
    pendingSmiles = smiles;
    box.innerHTML = '<div class="struct-msg">Loading structure renderer…</div>';
    return;
  }

  try {
    const mol = window.RDKit.get_mol(smiles);
    if (!mol || !mol.is_valid()) throw new Error('invalid');

    const w = Math.min(Math.max((box.clientWidth || 400) - 16, 200), 560);
    const h = 230;

    // Try with stereo annotations; fall back to plain SVG
    let svg;
    try {
      const details = JSON.stringify({ width: w, height: h, addStereoAnnotation: true });
      svg = mol.get_svg_with_highlights(details);
    } catch {
      svg = mol.get_svg(w, h);
    }
    mol.delete();

    // Transparent background so the light panel shows through
    const cleaned = svg.replace(
      /(<rect[^>]*)(fill:#FFFFFF|fill:white)([^>]*>)/gi,
      '$1fill:transparent$3'
    );
    box.innerHTML = cleaned;
  } catch(e) {
    box.innerHTML = '<div class="struct-msg">Structure unavailable.</div>';
  }
}

// ─── pH helpers ───────────────────────────────────────────────────────────────
function resolveCurrentPH() {
  const choices = [2, 7, 13];
  return choices[Math.floor(Math.random() * 3)];
}

function phNote(ph) {
  if (ph === 2)  return 'pH 2 — backbone fully protonated: –NH₃⁺ and –COOH.';
  if (ph === 7)  return 'pH 7 — physiological zwitterion: –NH₃⁺ and –COO⁻.';
  if (ph === 13) return 'pH 13 — backbone fully deprotonated: –NH₂ and –COO⁻.';
  return '';
}

// ─── Quiz flow ────────────────────────────────────────────────────────────────
function nextQuestion() {
  answered = false;
  scored   = false;

  const aa = AA[Math.floor(Math.random() * AA.length)];
  const ph = resolveCurrentPH();
  current  = { aa, ph };

  // Reset pH badge to hidden state
  const badge = document.getElementById('ph-badge');
  badge.textContent = 'pH ?';
  badge.classList.remove('revealed');

  // Draw structure
  drawStructure(aa.smiles[ph]);

  // Reset all fields
  ['c1','c3','name','type','ph'].forEach(id => {
    const el = document.getElementById('inp-' + id);
    el.value     = '';
    el.className = 'field-input';
    el.disabled  = false;
  });

  ['c1','c3','name','type','ph'].forEach(id => {
    document.getElementById('ind-' + id).textContent = '';
  });

  // Hide feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  // Re-enable check button
  document.getElementById('btn-check').disabled = false;

  document.getElementById('inp-c1').focus();
}

// ─── Answer checking ──────────────────────────────────────────────────────────
function norm(s) { return s.trim().toLowerCase(); }

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : s;
}

function checkAnswers() {
  if (!current || answered) return;

  const { aa } = current;
  const fields = [
    { id: 'c1',   correct: aa.code1,       user: document.getElementById('inp-c1').value.trim().toUpperCase() },
    { id: 'c3',   correct: aa.code3,       user: capitalize(document.getElementById('inp-c3').value.trim()) },
    { id: 'name', correct: aa.name,        user: capitalize(document.getElementById('inp-name').value.trim()) },
    { id: 'type', correct: aa.type,        user: document.getElementById('inp-type').value },
    { id: 'ph',   correct: String(current.ph), user: document.getElementById('inp-ph').value }
  ];

  function isMatch(f) { return norm(f.user) === norm(f.correct); }

  let pts = 0;
  fields.forEach(f => {
    const el  = document.getElementById('inp-' + f.id);
    const ind = document.getElementById('ind-' + f.id);
    const ok  = isMatch(f);
    if (ok) {
      el.className = 'field-input ok';
      el.disabled  = true;
      ind.textContent = '✓';
      pts++;
    } else {
      el.className = 'field-input bad';
      el.disabled  = false;
      ind.textContent = '✗';
    }
  });

  // Record score on first attempt only
  if (!scored) {
    scored = true;
    score.total++;
    score.pts    += pts;
    score.maxPts += 5;
    if (pts === 5)      score.correct++;
    else if (pts >= 1)  score.partial++;
    updateScore();
  }

  // Reveal pH badge on first check
  const badge = document.getElementById('ph-badge');
  badge.textContent = `pH ${current.ph}`;
  badge.classList.add('revealed');

  // All correct → lock everything and end question
  if (pts === 5) {
    answered = true;
    document.getElementById('btn-check').disabled = true;
  }

  // Feedback
  const fb  = document.getElementById('feedback');
  const cls = pts === 5 ? 'all-correct' : pts >= 1 ? 'partial' : 'wrong';
  const title = pts === 5 ? 'Perfect! All 5 correct.'
              : pts >= 1  ? `${pts}/5 correct — keep going!`
              :              'Not quite — 0/5 correct.';

  fb.className = `feedback show ${cls}`;
  fb.innerHTML = `
    <div class="fb-title">${title}</div>
    <div class="fb-answers">
      <b>${aa.code1}</b> &nbsp;·&nbsp; <b>${aa.code3}</b> &nbsp;·&nbsp;
      <b>${aa.name}</b> &nbsp;·&nbsp; <b>${TYPE_LABELS[aa.type]}</b> &nbsp;·&nbsp;
      <b>pH ${current.ph}</b>
    </div>
    <div class="fb-note">${aa.note}</div>
    <div class="fb-note">${phNote(current.ph)}</div>`;
}

// ─── Score ────────────────────────────────────────────────────────────────────
function updateScore() {
  document.getElementById('s-total').textContent   = score.total;
  document.getElementById('s-correct').textContent = score.correct;
  document.getElementById('s-partial').textContent = score.partial;
  const pct = score.maxPts > 0
    ? Math.round(score.pts / score.maxPts * 100) + '%'
    : '—';
  document.getElementById('s-pct').textContent = pct;
}

function resetScore() {
  score = { total: 0, correct: 0, partial: 0, pts: 0, maxPts: 0 };
  updateScore();
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  ['inp-c1','inp-c3','inp-name'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (!answered) checkAnswers();
        else nextQuestion();
      }
    });
  });
  nextQuestion();
});
</script>
